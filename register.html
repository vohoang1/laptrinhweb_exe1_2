<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình đăng ký</title>
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header-box">
            <a href="index.html">Home</a> | <a href="login.html">Đăng nhập</a> | <strong>Đăng ký</strong>
        </div>

        <div class="content-box">
            <h2>Màn hình đăng ký</h2>
            <form action="login.html" method="GET">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Nhập lại mật khẩu</label>
                    <input type="password" name="repassword" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-actions">
                    <a href="login.html">Đã có tài khoản</a>
                    <button type="submit" class="btn-blue">Đăng ký</button>
                </div>
            </form>
        </div>

        <div class="footer-box">
            Lập trình web @01/2024
        </div>
    </div>
</body>
</html>
